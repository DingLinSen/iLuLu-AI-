services:
  - type: web
    name: ai-chat
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        value: sk-879ea119867c48df91790c374387bcd6
